apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: admin-server-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/paharipratyush/petclinic-infra.git
    targetRevision: main
    path: helm/petclinic-service
    helm:
      releaseName: admin-server
      valueFiles:
        - ../../helm-values/admin-server.yaml
        - ../../helm-values/dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
