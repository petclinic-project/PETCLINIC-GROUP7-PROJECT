# Manages ExternalSecret CRs for dev environment.
# ArgoCD syncs these from k8s/overlays/dev/ — each manifest's
# metadata.namespace is respected, so multi-namespace resources work correctly.
# Run ./scripts/generate-config.sh dev before first sync to inject correct values.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/paharipratyush/petclinic-infra.git
    targetRevision: main
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    # ArgoCD uses this as default namespace only when manifest doesn't specify one.
    # All our ExternalSecret and Ingress manifests specify their own namespace explicitly.
    namespace: petclinic-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
