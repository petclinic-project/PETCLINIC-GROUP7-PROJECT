# Manages ExternalSecret CRs and Ingress for prod environment.
# Run ./scripts/generate-config.sh prod before first sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: INFRA_REPO_URL_PLACEHOLDER
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - PruneLast=true
