apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  policy.default: role:readonly
  policy.csv: |
    # Admin role — full access to all apps, settings, and clusters
    p, role:admin, applications, *, */*, allow
    p, role:admin, clusters, get, *, allow
    p, role:admin, repositories, *, *, allow
    p, role:admin, projects, *, *, allow
    p, role:admin, accounts, *, *, allow
    p, role:admin, gpgkeys, *, *, allow
    p, role:admin, logs, get, */*, allow
    p, role:admin, exec, create, */*, allow

    # Developer role — view all apps, sync dev only, no prod access
    p, role:developer, applications, get, */*, allow
    p, role:developer, applications, sync, */petclinic-dev/*, allow
    p, role:developer, applications, action/apps/Rollback, */petclinic-dev/*, allow
    p, role:developer, logs, get, */petclinic-dev/*, allow
    p, role:developer, clusters, get, *, allow
    p, role:developer, repositories, get, *, allow
    p, role:developer, projects, get, *, allow

    # Bind admin role to the admin user
    g, admin, role:admin
  scopes: '[groups]'
