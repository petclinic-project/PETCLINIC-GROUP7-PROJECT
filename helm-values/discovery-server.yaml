image:
  repository: 482352877891.dkr.ecr.ap-south-1.amazonaws.com/petclinic-dev/discovery-server
  tag: v1.0.0
service:
  port: 8761
# HA in prod — discovery-server must be highly available as all services depend on it
replicaCount: 2
env:
  - name: SPRING_PROFILES_ACTIVE
    value: "docker"
  - name: CONFIG_SERVER_URL
    value: "http://config-server:8888"
initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command:
      - sh
      - -c
      - 'until wget -qO- http://config-server:8888/actuator/health; do echo "waiting for config-server..."; sleep 5; done'
