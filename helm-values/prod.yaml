# Prod environment overrides — applied on top of per-service values
# NOTE: replicaCount is NOT set here — it is set per-service in helm-values/{service}.yaml
# Services that need HA (replicaCount: 2): config-server, discovery-server, api-gateway,
#   customers-service, visits-service, vets-service
# Services that stay at 1: genai-service (cost), admin-server (monitoring)

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi
