image:
  # Filled automatically by scripts/generate-config.sh after terraform apply
  repository: 482352877891.dkr.ecr.ap-south-1.amazonaws.com/petclinic-prod/api-gateway
  tag: "v1.0.0"
service:
  port: 8080
resources:
  requests:
    cpu: 200m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi
replicaCount: 2
env:
  - name: SPRING_PROFILES_ACTIVE
    value: "docker"
  - name: CONFIG_SERVER_URL
    value: "http://config-server:8888"
  - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
    value: "http://zipkin.tracing:9411/api/v2/spans"
  - name: MANAGEMENT_TRACING_EXPORT_ZIPKIN_ENDPOINT
    value: "http://zipkin.tracing:9411/api/v2/spans"
  - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
    value: "1.0"
  - name: MANAGEMENT_METRICS_DISTRIBUTION_PERCENTILESHISTOGRAM_HTTP_SERVER_REQUESTS
    value: "true"
  - name: MANAGEMENT_METRICS_DISTRIBUTION_SLO_HTTP_SERVER_REQUESTS
    value: "50ms,100ms,200ms,500ms,1s,2s"
  - name: SPRING_CLOUD_GATEWAY_METRICS_ENABLED
    value: "true"
initContainers:
  - name: wait-for-dependencies
    image: busybox:1.36
    command:
      - sh
      - -c
      - |
        echo "Waiting for config-server..."
        until wget -qO- http://config-server:8888/actuator/health 2>/dev/null; do
          sleep 5
        done
        echo "Config-server ready. Waiting for discovery-server..."
        until wget -qO- http://discovery-server:8761/actuator/health 2>/dev/null; do
          sleep 5
        done
        echo "Discovery-server ready. Waiting for zipkin..."
        until wget -qO- http://zipkin.tracing:9411/health 2>/dev/null; do
          sleep 5
        done
        echo "All dependencies ready!"
  - name: RESILIENCE4J_CIRCUITBREAKER_INSTANCES_GENAICIRCUITBREAKER_MINIMUMNUMBEROFCALLS
    value: "10"
  - name: RESILIENCE4J_CIRCUITBREAKER_INSTANCES_GENAICIRCUITBREAKER_SLIDINGWINDOWSIZE
    value: "20"
  - name: RESILIENCE4J_CIRCUITBREAKER_INSTANCES_GENAICIRCUITBREAKER_FAILURERATETHRESHOLD
    value: "80"
  - name: RESILIENCE4J_CIRCUITBREAKER_INSTANCES_GENAICIRCUITBREAKER_WAITDURATIONINOPENSTATE
    value: "10s"
  - name: RESILIENCE4J_CIRCUITBREAKER_INSTANCES_GENAICIRCUITBREAKER_PERMITTEDNUMBEROFCALLSINHALFOPENSTATE
    value: "5"
  - name: RESILIENCE4J_TIMELIMITER_INSTANCES_GENAICIRCUITBREAKER_TIMEOUTDURATION
    value: "30s"
