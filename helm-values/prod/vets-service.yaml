image:
  # Filled automatically by scripts/generate-config.sh after terraform apply
  repository: 482352877891.dkr.ecr.ap-south-1.amazonaws.com/petclinic-prod/vets-service
  tag: "v1.0.0"
service:
  port: 8083
replicaCount: 2
env:
  - name: SPRING_PROFILES_ACTIVE
    # production profile is REQUIRED for Caffeine cache
    # CacheConfig is gated on @Profile("production") — cache only works with this profile
    value: "docker,mysql,production"
  - name: CONFIG_SERVER_URL
    value: "http://config-server:8888"
  - name: SPRING_DATASOURCE_URL
    value: "jdbc:mysql://petclinic-prod-mysql.cbsumcwgg4sm.ap-south-1.rds.amazonaws.com:3306/petclinic"
  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        name: rds-credentials
        key: username
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: rds-credentials
        key: password
  - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
    value: "http://zipkin.tracing:9411/api/v2/spans"
  - name: MANAGEMENT_TRACING_EXPORT_ZIPKIN_ENDPOINT
    value: "http://zipkin.tracing:9411/api/v2/spans"
  - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
    value: "1.0"
  - name: MANAGEMENT_METRICS_DISTRIBUTION_PERCENTILESHISTOGRAM_HTTP_SERVER_REQUESTS
    value: "true"
  - name: MANAGEMENT_METRICS_DISTRIBUTION_SLO_HTTP_SERVER_REQUESTS
    value: "50ms,100ms,200ms,500ms,1s,2s"
  - name: SPRING_SQL_INIT_MODE
    value: never
  - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
    value: "5"
  - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
    value: "2"
initContainers:
  - name: wait-for-dependencies
    image: busybox:1.36
    command:
      - sh
      - -c
      - |-
        echo "Waiting for config-server..."
        until wget -qO- http://config-server:8888/actuator/health 2>/dev/null; do sleep 5; done
        echo "Config-server ready. Waiting for zipkin..."
        until wget -qO- http://zipkin.tracing:9411/health 2>/dev/null; do sleep 5; done
        echo "All dependencies ready!"
