apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-credentials
  namespace: petclinic-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: rds-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: petclinic/prod/rds-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: petclinic/prod/rds-credentials
        property: password
    - secretKey: host
      remoteRef:
        key: petclinic/prod/rds-credentials
        property: host
    - secretKey: port
      remoteRef:
        key: petclinic/prod/rds-credentials
        property: port
