global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'ALERTMANAGER_EMAIL_PLACEHOLDER'
  smtp_auth_username: 'ALERTMANAGER_EMAIL_PLACEHOLDER'
  smtp_auth_password: 'ALERTMANAGER_PASSWORD_PLACEHOLDER'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'namespace']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'null'
  routes:
    - matchers:
        - severity = "critical"
      receiver: 'critical-alerts'
      group_wait: 0s
      repeat_interval: 1h
    - matchers:
        - severity = "warning"
      receiver: 'warning-alerts'
      group_wait: 30s
      repeat_interval: 4h

receivers:
  - name: 'null'
  - name: 'critical-alerts'
    email_configs:
      - to: 'ALERTMANAGER_EMAIL_PLACEHOLDER'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] Petclinic Alert: {{ .GroupLabels.alertname }}'
  - name: 'warning-alerts'
    email_configs:
      - to: 'ALERTMANAGER_EMAIL_PLACEHOLDER'
        send_resolved: true
        headers:
          Subject: '[WARNING] Petclinic Alert: {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'namespace']
